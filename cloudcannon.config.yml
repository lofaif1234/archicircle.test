source: .
output: dist

# CloudCannon Configuration
# https://cloudcannon.com/documentation/configuration/

_enabled_editors:
  - visual
  - content
  - data

# ─── SSG ──────────────────────────────────────────────────────────────────────
ssg: astro

# ─── Data files ───────────────────────────────────────────────────────────────
# Each entry is a named data set CloudCannon can read/write.
# Astro pages import the matching JSON at build time.
data_config:
  site:
    path: src/data/site.json
  page_index:
    path: src/data/pages/index.json
  page_contacto:
    path: src/data/pages/contacto.json
  page_coworking:
    path: src/data/pages/coworking.json
  page_corte_laser:
    path: src/data/pages/corte-laser-online.json
  page_declaracion:
    path: src/data/pages/declaracion.json
  page_maquinaria:
    path: src/data/pages/maquinaria.json
  page_materiales:
    path: src/data/pages/materiales.json
  page_servicios_diseno:
    path: src/data/pages/servicios-de-diseno.json
  page_servicios_fabricacion:
    path: src/data/pages/servicios-de-fabricacion.json
  page_sobre_nosotros:
    path: src/data/pages/sobre-nosotros.json
  page_tienda:
    path: src/data/pages/tienda.json

# ─── Collections ──────────────────────────────────────────────────────────────
collections_config:
  pages:
    name: Pages
    path: src/pages
    output: true
    url: /[slug]
    filter:
      base: none
      include:
        - "*.astro"
    _enabled_editors:
      - visual
      - content

# ─── Global Editables ─────────────────────────────────────────────────────────
_editables:
  text:
    italic: true
    bold: true
    underline: false
    link: true
  block:
    format: p h1 h2 h3 h4
    bold: true
    italic: true
    link: true
    bulletedlist: true
    numberedlist: true
  image:
    width: true
    resize_style: contain
    mime_types:
      - image/png
      - image/jpeg
      - image/webp
      - image/gif
      - image/svg+xml
