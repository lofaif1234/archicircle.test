source: .
output: dist

# CloudCannon Configuration
# See https://cloudcannon.com/documentation/configuration/
_enabled_editors:
  - visual
  - content

collections_config:
  pages:
    name: Pages
    path: src/pages
    output: true
    filter:
      base: none
      search:
        - "*.astro"

# Astro specific settings
# CloudCannon will build the site using 'npm run build'
ssg: astro
