<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Archicercle</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Include the script that builds the page and powers Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle("/style.css");

    // Register a custom preview for the "pages" collection
    CMS.registerPreviewTemplate("pages", createClass({
      render: function() {
        var entry = this.props.entry;
        
        // Try both possible key names (Hero/General)
        var title = entry.getIn(['data', 'hero_title']) || entry.getIn(['data', 'title']);
        var description = entry.getIn(['data', 'hero_description']) || entry.getIn(['data', 'description']);
        
        // Handle images (Home uses intro-bg, others use hero_image)
        var imagePath = entry.getIn(['data', 'intro-bg']) || entry.getIn(['data', 'hero_image']);
        var image = imagePath ? this.props.getAsset(imagePath) : null;

        return h('div', { className: 'preview-container' },
          h('main', {},
            h('section', { 
              className: 'hero about-hero materials-hero-custom',
              style: { position: 'relative', minHeight: '400px', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', color: '#fff', overflow: 'hidden' }
            },
              h('div', { 
                className: 'hero-overlay about-hero-overlay materials-hero-overlay',
                style: { position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.7)', zIndex: 1 }
              }),
              image ? h('img', { 
                src: image.toString(), 
                className: 'hero-bg about-hero-bg materials-hero-bg',
                style: { position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', objectFit: 'cover', zIndex: 0 }
              }) : null,
              h('div', { 
                className: 'container',
                style: { position: 'relative', zIndex: 2, padding: '0 20px' }
              },
                h('div', { className: 'hero-top about-hero-content materials-hero-content' },
                  h('h1', { 
                    style: { fontSize: '3rem', fontWeight: '800', textTransform: 'uppercase', marginBottom: '20px' },
                    dangerouslySetInnerHTML: { __html: title }
                  }),
                  h('p', { 
                    className: 'subtitle about-subtitle',
                    style: { fontSize: '1.2rem', maxWidth: '800px', margin: '0 auto' },
                    dangerouslySetInnerHTML: { __html: description }
                  })
                )
              )
            )
          )
        );
      }
    }));
  </script>
</body>
</html>
